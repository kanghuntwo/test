<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>앱 목록</title>
  <style>
    body {
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f4f4f4;
      text-align: center;
    }

    td.num {
      text-align: center;
      width: 60px;
    }

    td.name {
      width: 160px;
    }

    .search-box {
      margin-bottom: 12px;
      display: flex;
      gap: 8px;
    }

    .search-box input {
      flex: 1;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .search-box button,
    .search-box .btn-link {
      padding: 8px 16px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f4f4f4;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      color: #333;
      display: inline-flex;
      align-items: center;
    }

    .search-box button:hover,
    .search-box .btn-link:hover {
      background: #e8e8e8;
    }

    .search-box .btn-link.primary {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }

    .search-box .btn-link.primary:hover {
      background: #1666cc;
    }

    .no-result {
      padding: 16px;
      text-align: center;
      color: #888;
      border: 1px dashed #ccc;
      margin-top: 8px;
      display: none;
    }

    .pagination {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .pagination button {
      min-width: 36px;
      padding: 6px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }

    .pagination button:hover:not(:disabled) {
      background: #f4f4f4;
    }

    .pagination button.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
      font-weight: bold;
    }

    .pagination button:disabled {
      color: #bbb;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>앱 리스트</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="앱 명을 입력하세요" autocomplete="off">
    <button type="button" id="resetButton">초기화</button>
    <a href="edit.html" class="btn-link primary">편집</a>
  </div>
  <table id="appTable">
    <thead>
      <tr>
        <th>번호</th>
        <th>앱 명</th>
        <th>앱 정보</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="no-result" id="noResult">검색 결과가 없습니다.</div>
  <div class="pagination" id="pagination"></div>

  <script src="apps.js"></script>
  <script>
    (function () {
      const PAGE_SIZE = 10;

      let apps = window.loadApps();
      let currentPage = 1;
      let currentFilter = '';

      const tbody = document.querySelector('#appTable tbody');
      const searchInput = document.getElementById('searchInput');
      const resetBtn = document.getElementById('resetButton');
      const noResult = document.getElementById('noResult');
      const pagination = document.getElementById('pagination');

      function getFiltered() {
        const k = currentFilter.toLowerCase();
        const result = [];
        apps.forEach(function (app, idx) {
          if (app.deleted) return;
          if (app.name.toLowerCase().includes(k)) {
            result.push({ app: app, idx: idx });
          }
        });
        return result;
      }

      function renderTable() {
        const filtered = getFiltered();
        const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const start = (currentPage - 1) * PAGE_SIZE;
        const pageItems = filtered.slice(start, start + PAGE_SIZE);

        tbody.innerHTML = pageItems.map(function (item) {
          return '<tr>' +
            '<td class="num">' + (item.idx + 1) + '</td>' +
            '<td class="name">' + window.escapeHtml(item.app.name) + '</td>' +
            '<td>' + window.escapeHtml(item.app.info) + '</td>' +
            '</tr>';
        }).join('');

        noResult.style.display = filtered.length === 0 ? 'block' : 'none';
        renderPagination(totalPages, filtered.length);
      }

      function renderPagination(totalPages, totalCount) {
        pagination.innerHTML = '';
        if (totalCount === 0) return;

        function addBtn(label, disabled, onClick, active) {
          const b = document.createElement('button');
          b.type = 'button';
          b.textContent = label;
          if (disabled) b.disabled = true;
          if (active) b.classList.add('active');
          b.addEventListener('click', onClick);
          pagination.appendChild(b);
        }

        addBtn('처음', currentPage === 1, function () { currentPage = 1; renderTable(); });
        addBtn('이전', currentPage === 1, function () { currentPage--; renderTable(); });
        for (let i = 1; i <= totalPages; i++) {
          (function (page) {
            addBtn(String(page), false, function () { currentPage = page; renderTable(); }, page === currentPage);
          })(i);
        }
        addBtn('다음', currentPage === totalPages, function () { currentPage++; renderTable(); });
        addBtn('마지막', currentPage === totalPages, function () { currentPage = totalPages; renderTable(); });
      }

      searchInput.addEventListener('input', function () {
        currentFilter = this.value.trim();
        currentPage = 1;
        renderTable();
      });

      resetBtn.addEventListener('click', function () {
        searchInput.value = '';
        currentFilter = '';
        currentPage = 1;
        renderTable();
        searchInput.focus();
      });

      renderTable();
    })();
  </script>
</body>

</html>
