<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handwritten Digit Recognizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>손글씨 숫자 인식기</h1>
    <p class="subtitle">아래 캔버스에 숫자(0–9)를 그리세요</p>

    <div class="main">
      <!-- Canvas panel -->
      <div class="canvas-panel">
        <canvas id="canvas" width="280" height="280"></canvas>
        <div class="btn-row">
          <button id="btn-clear" class="btn btn-clear">지우기</button>
          <button id="btn-predict" class="btn btn-predict">예측</button>
        </div>
      </div>

      <!-- Result panel -->
      <div class="result-panel">
        <div class="prediction-box">
          <div class="digit-label" id="digit">—</div>
          <div class="confidence" id="confidence">숫자를 그리고 예측을 누르세요</div>
        </div>

        <div class="bars-section">
          <div class="bars-title">클래스별 확률</div>
          <div id="bars-container">
            <!-- generated by app.js -->
          </div>
        </div>
      </div>
    </div>

    <div id="status" class="status">서버 연결 중…</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
